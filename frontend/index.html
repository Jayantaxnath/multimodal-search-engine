<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Multimodal Image Retrieval</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">◍</span>
      <span class="brand-name">Image Retrieval System</span>
      <span class="brand-tag">CLIP · Flickr30K</span>
    </div>
    <div class="topbar-links">
      <a href="https://github.com/Jayantaxnath/" target="_blank" rel="noopener" aria-label="GitHub">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5C5.73.5.5 5.73.5 12c0 5.08 3.29 9.39 7.86 10.91.57.1.78-.25.78-.55 0-.27-.01-1.17-.02-2.12-3.2.7-3.88-1.36-3.88-1.36-.52-1.33-1.28-1.69-1.28-1.69-1.04-.71.08-.7.08-.7 1.15.08 1.76 1.18 1.76 1.18 1.03 1.76 2.7 1.25 3.36.96.1-.75.4-1.25.73-1.54-2.56-.29-5.25-1.28-5.25-5.7 0-1.26.45-2.28 1.18-3.09-.12-.29-.51-1.46.11-3.05 0 0 .97-.31 3.18 1.18a11.1 11.1 0 0 1 5.8 0c2.2-1.49 3.17-1.18 3.17-1.18.63 1.59.24 2.76.12 3.05.74.81 1.18 1.83 1.18 3.09 0 4.43-2.7 5.4-5.27 5.69.42.36.78 1.08.78 2.18 0 1.57-.01 2.83-.01 3.22 0 .31.2.66.79.55A10.52 10.52 0 0 0 23.5 12C23.5 5.73 18.27.5 12 .5Z"/></svg>
      </a>
      <a href="https://www.linkedin.com/in/jayanta-nath-972a04282/" target="_blank" rel="noopener" aria-label="LinkedIn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20.45 20.45h-3.56v-5.57c0-1.33-.03-3.04-1.85-3.04-1.85 0-2.14 1.45-2.14 2.94v5.67H9.34V9h3.42v1.56h.05c.48-.9 1.64-1.85 3.38-1.85 3.61 0 4.28 2.38 4.28 5.47v6.27ZM5.34 7.43a2.07 2.07 0 1 1 0-4.13 2.07 2.07 0 0 1 0 4.13ZM7.12 20.45H3.56V9h3.56v11.45Z"/></svg>
      </a>
    </div>
  </header>

  <main>
    <section class="hero">
      <h1>Search Flickr31K by <span>meaning</span>, not metadata.</h1>
      <p class="hero-sub">Type a description, drop in an image, or combine both - one embedding space, one bar.</p>

      <div class="searchbar" id="searchbar">
        <button class="attach-btn" id="attachBtn" title="Attach an image" aria-label="Attach image">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05 12.25 20.24a5.5 5.5 0 0 1-7.78-7.78l9.19-9.19a3.67 3.67 0 0 1 5.19 5.19L9.66 17.65a1.83 1.83 0 0 1-2.6-2.6l8.49-8.48"/></svg>
        </button>
        <input type="file" id="imageInput" accept="image/*" hidden />

        <div class="image-chip" id="imageChip" hidden>
          <img id="imageChipThumb" alt="Attached image"/>
          <button id="removeImage" aria-label="Remove image">×</button>
        </div>

        <input type="text" id="textInput" class="text-input" placeholder="a cat playing with a string on a wooden floor…" />

        <button class="search-btn" id="searchBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          <span>Search</span>
        </button>
      </div>

      <div class="alpha-row" id="alphaRow" hidden>
        <label for="alphaSlider">image weight <span id="alphaVal">0.70</span></label>
        <input type="range" id="alphaSlider" min="0" max="1" step="0.05" value="0.7" />
      </div>

      <p class="status-line" id="statusLine"></p>
    </section>

    <section class="results" id="results" aria-live="polite"></section>
    <div class="sentinel" id="sentinel"></div>
  </main>

  <footer class="foot">
    <span>Built on CLIP ViT-B/32 · MongoDB Atlas Vector Search · FastAPI</span>
  </footer>

  <script src="script.js"></script>
</body>
</html>
