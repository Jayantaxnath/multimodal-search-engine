<!DOCTYPE html>
<html>

<head>
    <title>Multimodal Search Engine</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- HOME PAGE -->
    <div class="center-container" id="home">
        <!-- <img src="../data/Flickr8k dataset/Images/1000268201_693b08cb0e.jpg" alt=""> -->

        <h1 class="main-title">Multimodal Search Engine</h1>

        <div class="search-button">
            <div class="search-container">
                <input type="text" id="searchInput" class="search-input"
                    placeholder="Search with text or upload image..." autocomplete="off" autocapitalize="off"
                    autocorrect="off" spellcheck="false">
                <img id="searchPreview" class="search-preview" alt="Uploaded preview">
                <button id="removeSearchPreview" class="remove-preview" type="button"
                    aria-label="Remove uploaded image">&times;</button>
                <input type="file" id="imageInput" accept="image/*" hidden>
                <span class="image-upload" onclick="triggerUpload()">
                    <img height="40px" width="40px" src="image2.png" alt="image">
                </span>
            </div>
            <button class="search-btn" onclick="search()">Search</button>
        </div>

    </div>

    <!-- RESULTS PAGE -->
    <div class="results-page" id="resultsPage">

        <div class="top-search">
            <div class="search-container">
                <input type="text" id="topSearchInput" class="search-input" placeholder="Search Here" autocomplete="off"
                    autocapitalize="off" autocorrect="off" spellcheck="false">
                <img id="topSearchPreview" class="search-preview" alt="Uploaded preview">
                <button id="removeTopSearchPreview" class="remove-preview" type="button"
                    aria-label="Remove uploaded image">&times;</button>
                <input type="file" id="imageInput2" accept="image/*" hidden>
                <span class="image-upload" onclick="triggerUploadTop()">
                    <img height="40px" width="40px" src="image2.png" alt="image">
                </span>
            </div>
            <button class="search-btn2" onclick="search()">Search</button>
        </div>

        <div class="tabs">
            <span class="active">Relevant Results</span>
        </div>

        <div id="mixedResults"></div>

    </div>

    <script src="script.js"></script>
</body>

</html>
